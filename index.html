<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频分享</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 { font-size: 1.2rem; color: #333; margin-bottom: 1.5rem; }
        audio { width: 100%; outline: none; }
        .download-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2da44e;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
        }
        .download-btn:hover { background-color: #2c974b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>音频文件试听</h1>
        
        <!-- 这里的 src 请修改为你实际上传的音频文件名 -->
        <audio controls>
            <source src="guoanxuanchuan.mp3" type="audio/mpeg">
            您的浏览器不支持音频播放。
        </audio>

        <br>
        <!-- 这里的 href 也请修改为你的文件名 -->
        <a href="guoanxuanchuan.mp3" download="guoanxuanchuan.mp3" class="download-btn">下载音频</a>
    </div>
</body>
</html>
